<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Playground</title>
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/7bf12df681.js"
      crossorigin="anonymous"
    ></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <section class="hero-background">
      <div class="orb orb-one"></div>
      <div class="orb orb-two"></div>
      <div class="orb orb-three"></div>
      <div class="orb orb-four"></div>
      <div class="orb orb-five"></div>
      <main class="hero-content">
        <p class="eyebrow">github.com/hannahashe</p>
        <h1>Hannah Ashe</h1>
        <p>This is a simple playground for testing CSS styles.</p>
      </main>
    </section>

    <div class="pop-tabs" role="region" aria-label="Quick info panels">
      <nav class="pop-tab-bar" aria-label="Open info panel">
        <details class="pop-item">
          <summary class="pop-tab"><i class="fa-solid fa-pisces"></i></summary>
          <section class="pop-panel">
            <header>
              <h2>About</h2>
            </header>
            <p>Short description or intro copy can live here.</p>
          </section>
        </details>
        <details class="pop-item">
          <summary class="pop-tab">
            <i class="fa-solid fa-capricorn"></i>
          </summary>
          <section class="pop-panel">
            <header>
              <h2>Links</h2>
            </header>
            <ul>
              <li><a href="https://github.com">GitHub</a></li>
              <li><a href="https://developer.mozilla.org">MDN Docs</a></li>
              <li><a href="https://css-tricks.com">CSS Tricks</a></li>
            </ul>
          </section>
        </details>
        <details class="pop-item">
          <summary class="pop-tab"><i class="fa-solid fa-libra"></i></summary>
          <section class="pop-panel">
            <header>
              <h2>Contact</h2>
            </header>
            <p>Email: hello@example.com</p>
          </section>
        </details>
      </nav>
    </div>
  </body>
</html>
